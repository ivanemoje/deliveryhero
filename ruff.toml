# ruff.toml — linting + formatting config
target-version = "py312"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line length — handled by formatter
    "B008",   # function calls in default args (common in FastAPI/LangGraph)
    "SIM108", # ternary operator — sometimes hurts readability
]

[lint.per-file-ignores]
"tests/*" = [
    "S101",  # allow assert statements in tests
    "F811",  # allow fixture redefinition
]

[format]
quote-style = "double"
indent-style = "space"
