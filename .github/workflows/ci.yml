name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/test_extractor.py tests/test_storage.py -v --tb=short

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test-unit

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: legal
          POSTGRES_PASSWORD: legal
          POSTGRES_DB: contracts
        ports:
          - 5432:5432
        options: >-
          --health-cmd 'pg_isready -U legal -d contracts'
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd 'curl -f http://localhost:9000/minio/health/live || exit 1'
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply database schema
        env:
          PGPASSWORD: legal
        run: psql -h localhost -U legal -d contracts -f scripts/init.sql

      - name: Create MinIO bucket
        run: |
          pip install minio
          python - <<'PYEOF'
          from minio import Minio
          c = Minio(
              'localhost:9000',
              access_key='minioadmin',
              secret_key='minioadmin',
              secure=False
          )
          if not c.bucket_exists('legal-documents'):
              c.make_bucket('legal-documents')
          print('Bucket ready')
          PYEOF

      - name: Run integration tests
        env:
          POSTGRES_USER: legal
          POSTGRES_PASSWORD: legal
          POSTGRES_DB: contracts
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: legal-documents
          MINIO_USE_SSL: false
          AGENT_MAX_RETRIES: 2
        run: pytest tests/test_integration.py -v --tb=short -m integration