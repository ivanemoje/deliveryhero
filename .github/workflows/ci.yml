name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

# ======================================================
# LINT
# ======================================================
jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

# ======================================================
# UNIT TESTS
# ======================================================
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/test_extractor.py tests/test_storage.py -v --tb=short

# ======================================================
# INTEGRATION TESTS
# ======================================================
  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test-unit

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: legal
          POSTGRES_PASSWORD: legal
          POSTGRES_DB: contracts
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U legal -d contracts"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: minio/minio:RELEASE.2024-04-18T19-09-19Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        command: server /data
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: pip

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client curl

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U legal -d contracts; do
            sleep 2
          done

      - name: Wait for MinIO
        run: |
          until curl -f http://localhost:9000/minio/health/live; do
            sleep 2
          done

      - name: Apply database schema
        env:
          PGPASSWORD: legal
        run: psql -h localhost -U legal -d contracts -f scripts/init.sql

      - name: Create MinIO bucket
        run: |
          pip install minio
          python - <<'PYEOF'
          from minio import Minio
          c = Minio(
              'localhost:9000',
              access_key='minioadmin',
              secret_key='minioadmin',
              secure=False
          )
          if not c.bucket_exists('legal-documents'):
              c.make_bucket('legal-documents')
          print('Bucket ready')
          PYEOF

      - name: Run integration tests
        env:
          POSTGRES_USER: legal
          POSTGRES_PASSWORD: legal
          POSTGRES_DB: contracts
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: legal-documents
          MINIO_USE_SSL: false
          AGENT_MAX_RETRIES: 2
        run: pytest tests/test_integration.py -v --tb=short -m integration

# ======================================================
# DOCKER BUILD + TRIVY + GHCR PUSH
# ======================================================
  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: test-integration

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch

      - name: Build image (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan-target
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --------------------------------------------------
      # TRIVY SECURITY SCAN
      # --------------------------------------------------
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan-target
          format: table

          # CURRENT MODE (prototype)
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH

          # FUTURE STRICT MODE (enable later)
          # exit-code: 1
          # severity: CRITICAL

      - name: Push image to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max